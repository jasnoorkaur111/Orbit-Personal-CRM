<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .planet { fill: #111111; }
      .ring { stroke: #111111; }
      .dot { fill: #111111; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a0f; }
      .planet { fill: #ffffff; }
      .ring { stroke: #ffffff; }
      .dot { fill: #ffffff; }
    }
  </style>
  <!-- Background -->
  <rect width="32" height="32" rx="8" class="bg"/>
  <!-- Planet -->
  <circle cx="16" cy="16" r="7" class="planet"/>
  <!-- Orbital ring (tilted ellipse) -->
  <ellipse cx="16" cy="16" rx="13" ry="4.5" class="ring" fill="none" stroke-width="1.2" transform="rotate(-25 16 16)"/>
  <!-- Satellite dot on the ring -->
  <circle cx="27" cy="12.5" r="1.8" class="dot" transform="rotate(-25 16 16)"/>
</svg>
